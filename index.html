<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>黄程锡美食平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --red:#D6242C;
  --red-deep:#9E1017;
  --gold:#F2B705;
  --paper:#FCF7EC;
  --paper-2:#F4EAD7;
  --ink:#221A15;
  --ink-soft:#6B5D51;
  --line:#E0D2BA;
  --jade:#1E6F5C;
  --shadow:0 2px 0 var(--line);
  --r:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(34,26,21,.06) 1px, transparent 0);
  background-size:22px 22px;
  color:var(--ink);
  font-family:"Noto Sans SC",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  -webkit-font-smoothing:antialiased;
  padding-bottom:60px;
}
.display{font-family:"ZCOOL QingKe HuangYou","Noto Sans SC",sans-serif;font-weight:400;letter-spacing:.02em}
.mono{font-family:"Space Mono",ui-monospace,monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px}

.wrap{max-width:960px;margin:0 auto;padding:0 16px}

/* ---------- 顶部招牌 ---------- */
.sign{
  background:var(--red);
  color:#fff;
  border-bottom:5px solid var(--gold);
  padding:18px 0 16px;
  position:relative;
  overflow:hidden;
}
.sign::after{
  content:"";position:absolute;left:0;right:0;bottom:-5px;height:5px;
  background:repeating-linear-gradient(90deg,var(--gold) 0 14px,var(--red-deep) 14px 28px);
}
.sign-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:10px}
.brand h1{font-size:30px;margin:0;line-height:1}
.brand .sub{font-size:11px;letter-spacing:.35em;opacity:.75;text-transform:uppercase}
.who{display:flex;align-items:center;gap:10px;font-size:13px}
.who b{font-weight:500;opacity:.9;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ghost{border:1px solid rgba(255,255,255,.5);border-radius:999px;padding:5px 12px;font-size:12px;color:#fff}
.ghost:hover{background:rgba(255,255,255,.15)}

/* ---------- 小票统计 ---------- */
.receipt{
  background:#fff;border:1px solid var(--line);border-radius:var(--r);
  margin-top:20px;padding:16px 18px;
  box-shadow:0 4px 0 rgba(34,26,21,.06);
}
.receipt-top{display:flex;justify-content:space-between;align-items:center;border-bottom:2px dashed var(--line);padding-bottom:10px;margin-bottom:12px}
.receipt-top h2{font-size:20px;margin:0}
.nav-btns{display:flex;gap:6px;align-items:center}
.nav-btns button{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);font-size:16px;line-height:1}
.nav-btns button:hover{background:var(--paper-2)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat{padding:6px 0}
.stat .k{font-size:11px;color:var(--ink-soft);letter-spacing:.1em}
.stat .v{font-size:22px;font-weight:700;line-height:1.2;margin-top:2px}
.stat .v small{font-size:12px;font-weight:400;color:var(--ink-soft)}

/* ---------- 日历 ---------- */
.cal{margin-top:18px;background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:0 4px 0 rgba(34,26,21,.06)}
.dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.dow span{text-align:center;font-size:11px;color:var(--ink-soft);letter-spacing:.1em}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cell{
  position:relative;aspect-ratio:1/1;border:1px solid var(--line);border-radius:10px;
  background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:transform .12s ease, box-shadow .12s ease;
}
.cell:hover{transform:translateY(-2px);box-shadow:0 4px 0 var(--line)}
.cell.blank{border:none;background:none;pointer-events:none}
.cell .num{position:absolute;top:5px;left:7px;font-size:11px;color:var(--ink-soft)}
.cell.today{border-color:var(--red);border-width:2px}
.cell.today .num{color:var(--red);font-weight:700}
.cell .face{font-size:26px;line-height:1}
.cell .face img{width:34px;height:34px;object-fit:cover;border-radius:50%}
.cell .cnt{position:absolute;bottom:5px;right:7px;font-size:10px;color:var(--ink-soft)}
.cell .money{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:10px;color:var(--jade)}
.cell.has{background:#fff}

/* ---------- 印章 ---------- */
.stamp{
  display:inline-flex;align-items:center;justify-content:center;
  border:2px solid currentColor;border-radius:6px;padding:2px 8px;
  font-family:"ZCOOL QingKe HuangYou",sans-serif;font-size:13px;
  transform:rotate(-6deg);opacity:.92;white-space:nowrap;
}

/* ---------- 图例 ---------- */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.legend .lv{display:flex;align-items:center;gap:6px;font-size:12px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 10px 4px 5px}
.legend .lv .em{font-size:16px}
.legend .lv img{width:22px;height:22px;border-radius:50%;object-fit:cover}
.legend .bar{height:4px;border-radius:2px;min-width:4px}

/* ---------- 弹窗 ---------- */
.mask{position:fixed;inset:0;background:rgba(34,26,21,.55);display:none;z-index:50;align-items:flex-end;justify-content:center}
.mask.on{display:flex}
.sheet{
  background:var(--paper);width:100%;max-width:620px;max-height:92vh;overflow:auto;
  border-radius:18px 18px 0 0;padding:18px;
  animation:up .22s cubic-bezier(.2,.8,.2,1);
}
@keyframes up{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
@media (min-width:640px){.mask{align-items:center}.sheet{border-radius:18px}}
@media (prefers-reduced-motion:reduce){.sheet{animation:none}.cell{transition:none}}
.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sheet-head h3{margin:0;font-size:22px}
.x{font-size:22px;width:34px;height:34px;border-radius:50%;line-height:1}
.x:hover{background:var(--paper-2)}

.meal{display:flex;gap:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:10px}
.meal .pic{width:76px;height:76px;border-radius:8px;object-fit:cover;background:var(--paper-2);flex:none}
.meal .body{flex:1;min-width:0}
.meal .t{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.meal .name{font-weight:700;font-size:15px}
.meal .price{font-size:15px;color:var(--jade)}
.meal .price small{color:var(--ink-soft)}
.meal .note{font-size:13px;color:var(--ink-soft);margin-top:4px;word-break:break-word}
.meal .del{font-size:12px;color:var(--ink-soft);margin-top:6px;text-decoration:underline}

.form{background:#fff;border:1px dashed var(--line);border-radius:12px;padding:14px;margin-top:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--ink-soft);letter-spacing:.08em;margin-bottom:5px}
.field input[type=text],.field input[type=number],.field textarea,.field select,.field input[type=email],.field input[type=password]{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--paper);
}
.field textarea{resize:vertical;min-height:56px}
.row2{display:flex;gap:10px}
.row2>div{flex:1}
.picker{display:flex;flex-wrap:wrap;gap:6px}
.pick{border:1px solid var(--line);border-radius:10px;padding:7px 10px;display:flex;align-items:center;gap:6px;font-size:13px;background:var(--paper)}
.pick img{width:20px;height:20px;border-radius:50%;object-fit:cover}
.pick.on{color:#fff;border-color:transparent;font-weight:700}
.btn{background:var(--red);color:#fff;border-radius:10px;padding:12px 18px;font-size:15px;font-weight:700;width:100%}
.btn:hover{background:var(--red-deep)}
.btn[disabled]{opacity:.5;cursor:default}
.btn-alt{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn-alt:hover{background:var(--paper-2)}
.prev{margin-top:8px;display:none}
.prev img{max-width:120px;border-radius:8px;display:block}

/* ---------- 登录 ---------- */
.gate{max-width:400px;margin:8vh auto;padding:0 16px}
.gate .card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:24px;box-shadow:0 6px 0 rgba(34,26,21,.08)}
.gate h1{font-size:32px;margin:0 0 4px}
.gate .tag{font-size:13px;color:var(--ink-soft);margin-bottom:20px}
.gate .swap{text-align:center;font-size:13px;color:var(--ink-soft);margin-top:14px}
.gate .swap button{color:var(--red);text-decoration:underline}
.err{background:#FDE8E8;border:1px solid #F5C2C2;color:#9E1017;font-size:13px;padding:9px 12px;border-radius:9px;margin-bottom:12px;display:none}
.err.on{display:block}
.hr{display:flex;align-items:center;gap:10px;color:var(--ink-soft);font-size:12px;margin:14px 0}
.hr::before,.hr::after{content:"";flex:1;height:1px;background:var(--line)}

.tools{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.tools button{font-size:12px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px}
.tools button:hover{background:var(--paper-2)}
.rate-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rate-row span{width:96px;font-size:13px}
.rate-row input{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px}
.hint{font-size:12px;color:var(--ink-soft);line-height:1.6}
.hidden{display:none!important}
.setup{background:var(--gold);color:var(--ink);padding:12px 16px;font-size:13px;line-height:1.6}
.setup code{background:rgba(0,0,0,.08);padding:1px 5px;border-radius:4px}
</style>
<style>
/* ---------- 板块切换 ---------- */
.tabs{display:flex;gap:4px;margin-top:14px;flex-wrap:wrap}
.tab{color:rgba(255,255,255,.72);font-size:14px;padding:7px 14px;border-radius:8px 8px 0 0;position:relative}
.tab:hover{color:#fff;background:rgba(0,0,0,.12)}
.tab.on{color:var(--ink);background:var(--paper);font-weight:700}
.view{display:none}
.view.on{display:block}

/* ---------- 喊话墙 ---------- */
.shout-form{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-top:20px;box-shadow:0 4px 0 rgba(34,26,21,.06)}
.shout-form .row{display:flex;gap:10px;align-items:flex-start}
.shout-form input[type=text]{width:132px;flex:none;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--paper)}
.shout-form textarea{flex:1;min-height:44px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--paper);resize:vertical}
.shout-form .send{margin-top:10px;width:auto;padding:10px 22px;float:right}
.wall{margin-top:20px;column-count:2;column-gap:12px}
@media (max-width:560px){.wall{column-count:1}.shout-form .row{flex-wrap:wrap}.shout-form input[type=text]{width:100%}}
.note{break-inside:avoid;background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:12px;position:relative;box-shadow:0 3px 0 rgba(34,26,21,.05)}
.note:nth-child(3n){background:#FFFBEE}
.note:nth-child(3n+2){background:#F4FAF6}
.note .nick{font-family:"ZCOOL QingKe HuangYou",sans-serif;font-size:16px;color:var(--red)}
.note .time{font-size:11px;color:var(--ink-soft);margin-left:8px}
.note .txt{margin-top:6px;font-size:15px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.note .kill{position:absolute;top:8px;right:10px;font-size:12px;color:var(--ink-soft);opacity:0;transition:opacity .15s}
.note:hover .kill,.note:focus-within .kill{opacity:1}

/* ---------- 品鉴 ---------- */
.rev-new{margin-top:20px;width:auto;padding:12px 24px}
.rev{background:#fff;border:1px solid var(--line);border-radius:var(--r);margin-top:16px;overflow:hidden;box-shadow:0 4px 0 rgba(34,26,21,.06)}
.rev .hero{width:100%;max-height:300px;object-fit:cover;display:block;background:var(--paper-2)}
.rev .in{padding:18px 20px}
.rev .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.rev h3{font-family:"ZCOOL QingKe HuangYou",sans-serif;font-size:26px;margin:0;font-weight:400}
.rev .dish{font-size:13px;color:var(--ink-soft);margin-top:2px}
.rev .verdict{font-family:"Noto Serif SC",serif;font-weight:600;font-size:19px;line-height:1.55;
  border-left:4px solid var(--gold);padding-left:14px;margin:16px 0;border-radius:0}
.rev .body{font-size:15px;line-height:1.85;white-space:pre-wrap;word-break:break-word}
.rev .foot{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:2px dashed var(--line);font-size:12px;color:var(--ink-soft)}
.rev .foot .p{font-size:17px;color:var(--jade)}
.empty{text-align:center;color:var(--ink-soft);font-size:14px;padding:44px 20px;border:2px dashed var(--line);border-radius:var(--r);margin-top:20px}
</style>
</head>

<body>

<section id="gate" class="gate">
  <div class="card">
    <h1 class="display">黄程锡美食平台</h1>
    <div class="tag">凭口令进店。</div>
    <div id="gateErr" class="err"></div>
    <div class="field">
      <label>口令</label>
      <input id="pwd" type="password" autocomplete="current-password" placeholder="••••••••" />
    </div>
    <button id="enterBtn" class="btn">进店</button>
  </div>
</section>

<main id="app" class="hidden">
  <header class="sign">
    <div class="wrap">
      <div class="sign-row">
        <div class="brand">
          <h1 class="display">黄程锡美食平台</h1>
          <span class="sub">daily food log</span>
        </div>
        <div class="who">
          <b id="userLabel">已进店</b>
          <button id="logoutBtn" class="ghost">出店</button>
        </div>
      </div>
      <nav class="tabs">
        <button class="tab on" data-view="cal">打卡日历</button>
        <button class="tab" data-view="wall">喊话墙</button>
        <button class="tab" data-view="rev">美食品鉴</button>
      </nav>
    </div>
  </header>

  <!-- ===== 日历 ===== -->
  <div id="v-cal" class="view on wrap">
    <section class="receipt">
      <div class="receipt-top">
        <h2 id="monthTitle" class="display">—</h2>
        <div class="nav-btns">
          <button id="prevM" aria-label="上个月">‹</button>
          <button id="todayBtn" style="width:auto;padding:0 12px;font-size:13px">今天</button>
          <button id="nextM" aria-label="下个月">›</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="k">打卡天数</div><div class="v" id="sDays">0</div></div>
        <div class="stat"><div class="k">连续打卡</div><div class="v" id="sStreak">0</div></div>
        <div class="stat"><div class="k">本月吃饭</div><div class="v" id="sMeals">0</div></div>
        <div class="stat"><div class="k">本月花费</div><div class="v" id="sMoney">0</div></div>
      </div>
    </section>
    <section class="cal">
      <div class="dow"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
      <div id="grid" class="grid"></div>
    </section>
    <div id="legend" class="legend"></div>
    <div class="tools">
      <button id="settingsBtn">货币与汇率</button>
      <button id="picsBtn">换等级表情包</button>
    </div>
  </div>

  <!-- ===== 喊话墙 ===== -->
  <div id="v-wall" class="view wrap">
    <div class="shout-form">
      <div class="row">
        <input id="wNick" type="text" maxlength="12" placeholder="你是谁" />
        <textarea id="wText" maxlength="500" placeholder="喊一句，比如：明天中午一起去吃那家牛肉火锅"></textarea>
      </div>
      <button id="wSend" class="btn send">贴上去</button>
      <div style="clear:both"></div>
    </div>
    <div id="wall" class="wall"></div>
    <div id="wallEmpty" class="empty hidden">墙上还是空的。第一句话由你来喊。</div>
  </div>

  <!-- ===== 品鉴 ===== -->
  <div id="v-rev" class="view wrap">
    <button id="revNew" class="btn rev-new">写一篇品鉴</button>
    <div id="revList"></div>
    <div id="revEmpty" class="empty hidden">还没有品鉴。吃到值得写的，就写一篇。</div>
  </div>
</main>


<div id="dayMask" class="mask">
  <div class="sheet">
    <div class="sheet-head">
      <h3 id="dayTitle" class="display">—</h3>
      <button class="x" data-close>×</button>
    </div>
    <div id="mealList"></div>
    <div class="form">
      <div class="field"><label>吃了什么</label>
        <input id="fName" type="text" placeholder="例如：楼下猪脚饭" /></div>
      <div class="field"><label>评级</label><div id="fLevels" class="picker"></div></div>
      <div class="field row2">
        <div><label>金额</label><input id="fAmount" type="number" step="0.01" min="0" placeholder="0.00" /></div>
        <div><label>货币</label><select id="fCur"></select></div>
      </div>
      <div class="field"><label>照片（可选）</label>
        <input id="fPhoto" type="file" accept="image/*" />
        <div id="fPrev" class="prev"><img alt="预览" /></div></div>
      <div class="field"><label>备注（可选）</label>
        <textarea id="fNote" placeholder="辣、量大、老板娘凶……"></textarea></div>
      <button id="saveMeal" class="btn">记这一餐</button>
    </div>
  </div>
</div>

<div id="setMask" class="mask">
  <div class="sheet">
    <div class="sheet-head"><h3 class="display">货币与汇率</h3><button class="x" data-close>×</button></div>
    <div class="field"><label>统计用的本位币</label><select id="baseCur"></select></div>
    <p class="hint">下面是 1 单位外币折合多少本位币。汇率随时会变，自己按当天的填就行。</p>
    <div id="rateList"></div>
    <button id="saveRates" class="btn">保存汇率</button>
  </div>
</div>

<div id="picMask" class="mask">
  <div class="sheet">
    <div class="sheet-head"><h3 class="display">换等级表情包</h3><button class="x" data-close>×</button></div>
    <p class="hint">给每个等级传一张图，全站都会跟着换。不传就用默认 emoji。</p>
    <div id="picList"></div>
  </div>
</div>

<div id="revMask" class="mask">
  <div class="sheet">
    <div class="sheet-head"><h3 class="display">写一篇品鉴</h3><button class="x" data-close>×</button></div>
    <div class="field"><label>店名</label>
      <input id="rPlace" type="text" placeholder="例如：陈记潮汕牛肉火锅" /></div>
    <div class="field"><label>吃的什么</label>
      <input id="rDish" type="text" placeholder="例如：吊龙 + 匙柄 + 手打牛肉丸" /></div>
    <div class="field"><label>评级</label><div id="rLevels" class="picker"></div></div>
    <div class="field row2">
      <div><label>人均</label><input id="rPrice" type="number" step="0.01" min="0" placeholder="0.00" /></div>
      <div><label>货币</label><select id="rCur"></select></div>
    </div>
    <div class="field"><label>一句话结论</label>
      <input id="rVerdict" type="text" maxlength="60" placeholder="吊龙三秒烫，为这一口值得打车过去" /></div>
    <div class="field"><label>正文</label>
      <textarea id="rBody" style="min-height:150px" placeholder="环境、服务、哪道菜必点、哪道避雷、下次还来不来……"></textarea></div>
    <div class="field"><label>配图（可选）</label>
      <input id="rPhoto" type="file" accept="image/*" />
      <div id="rPrev" class="prev"><img alt="预览" /></div></div>
    <div class="field"><label>署名</label>
      <input id="rAuthor" type="text" maxlength="12" placeholder="黄程锡" /></div>
    <button id="rSave" class="btn">发表品鉴</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  ['MOP','澳门元','MOP$'], ['JPY','日元','¥'], ['KRW','韩元','₩'], ['EUR','欧元','€'],
  ['GBP','英镑','£'], ['SGD','新加坡元','S$'], ['AUD','澳元','A$'], ['CAD','加元','C$'],
  ['THB','泰铢','฿'], ['MYR','马来西亚林吉特','RM']
];
const CUR = Object.fromEntries(CURRENCIES.map(c=>[c[0],{name:c[1],sym:c[2]}]));
const DEFAULT_RATES = { CNY:1, HKD:0.92, USD:7.15, TWD:0.225, MOP:0.89, JPY:0.047,
  KRW:0.0052, EUR:7.8, GBP:9.1, SGD:5.35, AUD:4.7, CAD:5.2, THB:0.2, MYR:1.55 };

const photoCache = {};

const $ = s => document.querySelector(s);
const ymd = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayStr = () => ymd(new Date());
const money = (n,cur) => (CUR[cur]?.sym||'') + n.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
const toBase = (a,c) => a * (prefs.rates[c] ?? 1) / (prefs.rates[prefs.base] ?? 1);
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function ago(ms){
  const d = Date.now()-ms;
  if(d<60000) return '刚刚';
  if(d<3600000) return Math.floor(d/60000)+' 分钟前';
  if(d<86400000) return Math.floor(d/3600000)+' 小时前';
  if(d<604800000) return Math.floor(d/86400000)+' 天前';
  const t = new Date(ms);
  return `${t.getMonth()+1}月${t.getDate()}日`;
}
function faceHTML(id,size){
  const l=LV[id]; if(!l) return '';
  const pic=prefs.pics[id];
  return pic ? `<img src="${pic}" alt="${l.name}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover">`
             : `<span style="font-size:${size}px">${l.emoji}</span>`;
}
function compress(file,maxSide=1000,q0=0.72){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=()=>{const img=new Image();
      img.onload=()=>{let{width:w,height:h}=img;const s=Math.min(1,maxSide/Math.max(w,h));
        w=Math.round(w*s);h=Math.round(h*s);const cv=document.createElement('canvas');
        cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
        let q=q0,out=cv.toDataURL('image/jpeg',q);
        while(out.length>700000&&q>0.3){q-=0.12;out=cv.toDataURL('image/jpeg',q)}res(out)};
      img.onerror=()=>rej(new Error('图片读不出来，换一张'));img.src=fr.result};
    fr.onerror=()=>rej(new Error('文件读取失败'));fr.readAsDataURL(file)});
}

/* ===================== 进店 ===================== */
const gateErr = $('#gateErr');
async function enter(){
  gateErr.classList.remove('on');
  const btn=$('#enterBtn'), v=$('#pwd').value.trim();
  if(!v){ $('#pwd').focus(); return; }
  if(v !== GATE){
    gateErr.textContent='口令不对。';
    gateErr.classList.add('on');
    $('#pwd').select();
    return;
  }
  btn.disabled=true; btn.textContent='正在开门…';
  try{
    await signInAnonymously(auth);
  }catch(e){
    const map={
      'auth/operation-not-allowed':'匿名登录还没打开：Firebase 控制台 Authentication → Sign-in method → 启用「匿名」',
      'auth/unauthorized-domain':'这个网址没在 Firebase 授权域名里，去 Authentication → Settings 添加',
      'auth/network-request-failed':'连不上 Firebase，检查网络',
      'auth/configuration-not-found':'Firebase 配置不对，检查 firebaseConfig'
    };
    gateErr.textContent = map[e.code] || e.message;
    gateErr.classList.add('on');
  }finally{
    btn.disabled=false; btn.textContent='进店';
  }
}
$('#enterBtn').onclick = enter;
$('#pwd').addEventListener('keydown', e=>{ if(e.key==='Enter') enter(); });
$('#logoutBtn').onclick = () => signOut(auth);

onAuthStateChanged(auth, async user=>{
  if(user){
    $('#gate').classList.add('hidden');
    $('#app').classList.remove('hidden');
    await loadPrefs();
    listenAll();
  }else{
    while(unsubs.length) unsubs.pop()();
    meals=[]; shouts=[]; reviews=[];
    $('#app').classList.add('hidden');
    $('#gate').classList.remove('hidden');
    $('#pwd').value='';
  }
});

/* ===================== 数据 ===================== */
async function loadPrefs(){
  try{
    const s = await getDoc(C.prefs());
    if(s.exists()){
      const d=s.data();
      prefs.base=d.base||'CNY';
      prefs.rates={...DEFAULT_RATES,...(d.rates||{})};
      prefs.pics=d.pics||{};
    }
  }catch(e){ console.warn('设置读取失败',e); }
  buildCurrencySelects(); renderLevelPicker(); renderRevLevels();
}
const savePrefs = () => setDoc(C.prefs(), prefs, {merge:true});

function listenAll(){
  while(unsubs.length) unsubs.pop()();
  unsubs.push(onSnapshot(C.meals(), s=>{
    meals=s.docs.map(d=>({id:d.id,...d.data()}));
    renderCal(); if(openDate) renderMealList();
  }, e=>console.error(e)));
  unsubs.push(onSnapshot(C.shouts(), s=>{
    shouts=s.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAtMs||0)-(a.createdAtMs||0));
    renderWall();
  }, e=>console.error(e)));
  unsubs.push(onSnapshot(C.reviews(), s=>{
    reviews=s.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAtMs||0)-(a.createdAtMs||0));
    renderReviews();
  }, e=>console.error(e)));
}
async function getPhoto(id){
  if(photoCache[id]!==undefined) return photoCache[id];
  try{ const s=await getDoc(C.photo(id)); photoCache[id]=s.exists()?s.data().data:null; }
  catch{ photoCache[id]=null; }
  return photoCache[id];
}

/* ===================== 日历 ===================== */
function renderCal(){ renderMonth(); renderStats(); renderLegend(); }

function renderMonth(){
  const y=cursor.getFullYear(), m=cursor.getMonth();
  $('#monthTitle').textContent=`${y} 年 ${m+1} 月`;
  const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  const byDay={}; meals.forEach(x=>(byDay[x.date]||=[]).push(x));
  let html='';
  for(let i=0;i<first;i++) html+='<div class="cell blank"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const list=byDay[ds]||[], isToday=ds===todayStr();
    let inner='';
    if(list.length){
      const best=list.reduce((a,b)=>(LV[b.level]?.rank||0)>(LV[a.level]?.rank||0)?b:a);
      const sum=list.reduce((s,x)=>s+toBase(x.amount||0,x.currency||prefs.base),0);
      inner=`<div class="face">${faceHTML(best.level,26)}</div>
             ${list.length>1?`<div class="cnt">×${list.length}</div>`:''}
             ${sum>0?`<div class="money mono">${CUR[prefs.base].sym}${Math.round(sum)}</div>`:''}`;
    }
    html+=`<button class="cell ${list.length?'has':''} ${isToday?'today':''}" data-date="${ds}">
             <span class="num mono">${d}</span>${inner}</button>`;
  }
  $('#grid').innerHTML=html;
  $('#grid').querySelectorAll('.cell[data-date]').forEach(el=>el.onclick=()=>openDay(el.dataset.date));
}
function renderStats(){
  const pre=`${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}`;
  const inM=meals.filter(x=>(x.date||'').startsWith(pre));
  const total=inM.reduce((s,x)=>s+toBase(x.amount||0,x.currency||prefs.base),0);
  $('#sDays').innerHTML=`${new Set(inM.map(x=>x.date)).size}<small> 天</small>`;
  $('#sMeals').innerHTML=`${inM.length}<small> 餐</small>`;
  $('#sMoney').innerHTML=`<span class="mono">${money(total,prefs.base)}</span>`;
  const all=new Set(meals.map(x=>x.date)); let streak=0; const c=new Date();
  if(!all.has(ymd(c))) c.setDate(c.getDate()-1);
  while(all.has(ymd(c))){streak++;c.setDate(c.getDate()-1)}
  $('#sStreak').innerHTML=`${streak}<small> 天</small>`;
}
function renderLegend(){
  $('#legend').innerHTML=LEVELS.map(l=>{
    const n=meals.filter(x=>x.level===l.id).length;
    return `<div class="lv"><span class="em">${faceHTML(l.id,20)}</span>
      <span style="color:${l.color};font-weight:700">${l.name}</span>
      <span class="mono" style="color:var(--ink-soft)">${n}</span></div>`}).join('');
}
function openDay(ds){
  openDate=ds;
  const d=new Date(ds+'T00:00:00');
  const wd=['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  $('#dayTitle').textContent=`${d.getMonth()+1} 月 ${d.getDate()} 日 ${wd}`;
  resetMealForm(); renderMealList(); $('#dayMask').classList.add('on');
}
async function renderMealList(){
  const list=meals.filter(x=>x.date===openDate).sort((a,b)=>(a.createdAtMs||0)-(b.createdAtMs||0));
  const box=$('#mealList');
  if(!list.length){ box.innerHTML=`<p class="hint" style="margin:0 0 14px">这天还是空的。下面记第一餐。</p>`; return; }
  box.innerHTML=list.map(x=>{
    const l=LV[x.level]||LV.yb;
    return `<div class="meal">
      ${x.hasPhoto?`<img class="pic" data-pic="${x.id}" alt="${esc(x.name)}">`
        :`<div class="pic" style="display:flex;align-items:center;justify-content:center">${faceHTML(x.level,34)}</div>`}
      <div class="body"><div class="t">
        <div class="name">${esc(x.name)||'没写名字'}</div>
        <div class="price mono">${x.amount?money(x.amount,x.currency):'<small>免费</small>'}</div></div>
        <div style="margin-top:6px"><span class="stamp" style="color:${l.color}">${l.name}</span></div>
        ${x.note?`<div class="note">${esc(x.note)}</div>`:''}
        ${x.currency!==prefs.base&&x.amount?`<div class="note mono">≈ ${money(toBase(x.amount,x.currency),prefs.base)}</div>`:''}
        <button class="del" data-del="${x.id}">删掉</button>
      </div></div>`}).join('');
  box.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>removeMeal(b.dataset.del));
  for(const img of box.querySelectorAll('[data-pic]')){
    const src=await getPhoto(img.dataset.pic); if(src) img.src=src;
  }
}
function renderLevelPicker(){
  $('#fLevels').innerHTML=LEVELS.map(l=>
    `<button class="pick ${l.id===pickedLevel?'on':''}" data-lv="${l.id}"
      style="${l.id===pickedLevel?`background:${l.color}`:''}">${faceHTML(l.id,18)} ${l.name}</button>`).join('');
  $('#fLevels').querySelectorAll('[data-lv]').forEach(b=>b.onclick=()=>{pickedLevel=b.dataset.lv;renderLevelPicker()});
}
function buildCurrencySelects(){
  const o=CURRENCIES.map(([c,n])=>`<option value="${c}">${c} · ${n}</option>`).join('');
  ['#fCur','#rCur','#baseCur'].forEach(sel=>{ $(sel).innerHTML=o; $(sel).value=prefs.base; });
}
function resetMealForm(){
  $('#fName').value='';$('#fAmount').value='';$('#fNote').value='';
  $('#fPhoto').value='';$('#fPrev').style.display='none';
  pickedPhoto=null;pickedLevel='yb';$('#fCur').value=prefs.base;renderLevelPicker();
}
$('#fPhoto').onchange=async e=>{
  const f=e.target.files[0]; if(!f)return;
  try{ pickedPhoto=await compress(f);
    $('#fPrev').querySelector('img').src=pickedPhoto; $('#fPrev').style.display='block';
  }catch(err){ alert(err.message) }
};
$('#saveMeal').onclick=async()=>{
  const btn=$('#saveMeal'), name=$('#fName').value.trim();
  if(!name){ $('#fName').focus(); return; }
  btn.disabled=true; btn.textContent='正在保存…';
  try{
    const ref=await addDoc(C.meals(),{
      date:openDate, name, level:pickedLevel,
      amount:parseFloat($('#fAmount').value)||0, currency:$('#fCur').value,
      note:$('#fNote').value.trim(), hasPhoto:!!pickedPhoto,
      createdAtMs:Date.now(), createdAt:serverTimestamp()
    });
    if(pickedPhoto){ await setDoc(C.photo(ref.id),{data:pickedPhoto}); photoCache[ref.id]=pickedPhoto; }
    resetMealForm();
  }catch(e){ alert('没存上：'+e.message) }
  finally{ btn.disabled=false; btn.textContent='记这一餐' }
};
async function removeMeal(id){
  if(!confirm('删掉这一餐？')) return;
  await deleteDoc(doc(db,'board','hcx','meals',id));
  deleteDoc(C.photo(id)).catch(()=>{});
  delete photoCache[id];
}
$('#prevM').onclick=()=>{cursor.setMonth(cursor.getMonth()-1);renderCal()};
$('#nextM').onclick=()=>{cursor.setMonth(cursor.getMonth()+1);renderCal()};
$('#todayBtn').onclick=()=>{cursor=new Date();cursor.setDate(1);renderCal()};

/* ===================== 汇率 / 表情包 ===================== */
$('#settingsBtn').onclick=()=>{ $('#baseCur').value=prefs.base; drawRates(); $('#setMask').classList.add('on') };
function drawRates(){
  const base=$('#baseCur').value;
  $('#rateList').innerHTML=CURRENCIES.filter(([c])=>c!==base).map(([c,n])=>{
    const v=prefs.rates[c]/prefs.rates[base];
    return `<div class="rate-row"><span>1 ${c} ${n}</span>
      <input class="mono" type="number" step="0.0001" data-rate="${c}" value="${+v.toFixed(4)}"></div>`}).join('');
}
$('#baseCur').onchange=drawRates;
$('#saveRates').onclick=async()=>{
  const base=$('#baseCur').value, next={[base]:1};
  $('#rateList').querySelectorAll('[data-rate]').forEach(i=>{
    next[i.dataset.rate]=parseFloat(i.value)||prefs.rates[i.dataset.rate]});
  prefs.base=base; prefs.rates=next;
  await savePrefs(); buildCurrencySelects(); renderCal(); renderReviews();
  $('#setMask').classList.remove('on');
};
$('#picsBtn').onclick=()=>{ drawPics(); $('#picMask').classList.add('on') };
function drawPics(){
  $('#picList').innerHTML=LEVELS.map(l=>`
    <div class="meal">
      <div class="pic" style="display:flex;align-items:center;justify-content:center">${faceHTML(l.id,44)}</div>
      <div class="body"><div class="name" style="color:${l.color}">${l.name}</div>
      <input type="file" accept="image/*" data-pic-lv="${l.id}" style="margin-top:8px;font-size:12px">
      ${prefs.pics[l.id]?`<button class="del" data-pic-clear="${l.id}">恢复默认表情</button>`:''}
      </div></div>`).join('');
  $('#picList').querySelectorAll('[data-pic-lv]').forEach(inp=>inp.onchange=async e=>{
    const f=e.target.files[0]; if(!f)return;
    prefs.pics[inp.dataset.picLv]=await compress(f,200,0.8);
    await savePrefs(); drawPics(); renderCal(); renderLevelPicker(); renderRevLevels(); renderReviews();
  });
  $('#picList').querySelectorAll('[data-pic-clear]').forEach(b=>b.onclick=async()=>{
    delete prefs.pics[b.dataset.picClear];
    await setDoc(C.prefs(),{pics:prefs.pics},{merge:true});
    drawPics(); renderCal(); renderLevelPicker(); renderRevLevels(); renderReviews();
  });
}

/* ===================== 弹窗 ===================== */
document.querySelectorAll('.mask').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('on')}));
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>b.closest('.mask').classList.remove('on'));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.mask.on').forEach(m=>m.classList.remove('on'))});

buildCurrencySelects(); renderLevelPicker(); renderRevLevels();
</script>
</body>
</html>
