<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>群吃饭零食打卡月历</title>
<style>
  :root{
    --paper:#F6F0E3;
    --card:#FFFDF8;
    --ink:#2E251C;
    --ink-soft:#7A6B58;
    --line:#E7DCC8;
    --line-strong:#D8C9AC;
    --meal:#E07B39;      /* 吃饭 暖橙 */
    --meal-soft:#FBEEDF;
    --snack:#C25E8A;     /* 零食 莓红 */
    --snack-soft:#F8E7EE;
    --today:#3F6B4F;
    --shadow:0 1px 2px rgba(46,37,28,.06), 0 8px 24px rgba(46,37,28,.06);
    --r:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 1px 1px, rgba(120,100,70,.08) 1px, transparent 0) 0 0/22px 22px,
      var(--paper);
    color:var(--ink);
    font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    padding:24px 16px 64px;
  }
  .wrap{max-width:960px;margin:0 auto;}
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}

  /* ---------- header ---------- */
  .brand{display:flex;align-items:center;gap:14px;margin:8px 4px 4px;}
  .brand .logo{
    width:52px;height:52px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#8a5a34,#5b3a20);
    display:grid;place-items:center;font-size:26px;color:#fff;
    box-shadow:var(--shadow);
  }
  .brand h1{font-size:26px;margin:0;letter-spacing:1px;font-weight:800;}
  .brand .h1-edit{cursor:text;outline:none;border-radius:6px;padding:0 4px;}
  .brand .h1-edit:focus{background:#fff;box-shadow:0 0 0 2px var(--line-strong);}
  .brand .sub{font-size:11px;letter-spacing:3px;color:var(--ink-soft);text-transform:uppercase;margin-top:2px;}

  .toolbar{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;margin:-40px 4px 18px;}
  @media(max-width:640px){.toolbar{justify-content:flex-start;margin-top:10px;}}
  .btn{
    border:1px solid var(--line-strong);background:var(--card);color:var(--ink);
    padding:8px 14px;border-radius:999px;font-size:13px;cursor:pointer;font-weight:600;
    transition:transform .08s ease, box-shadow .12s ease, background .12s;
  }
  .btn:hover{box-shadow:var(--shadow);}
  .btn:active{transform:translateY(1px);}
  .btn.ghost{background:transparent;}

  /* ---------- month nav ---------- */
  .monthbar{text-align:center;position:relative;margin:6px 0 16px;}
  .monthbar .title{font-size:22px;font-weight:800;letter-spacing:1px;}
  .monthbar .today-link{display:inline-block;margin-top:2px;font-size:13px;color:var(--meal);cursor:pointer;border-bottom:1px solid transparent;}
  .monthbar .today-link:hover{border-color:var(--meal);}
  .nav{
    position:absolute;top:0;width:38px;height:38px;border-radius:50%;
    border:1px solid var(--line-strong);background:var(--card);cursor:pointer;
    font-size:18px;color:var(--ink-soft);display:grid;place-items:center;
  }
  .nav:hover{color:var(--ink);box-shadow:var(--shadow);}
  .nav.prev{left:0;} .nav.next{right:0;}

  /* ---------- members ---------- */
  .members{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow);padding:12px 14px;margin-bottom:18px;
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;
  }
  .chip{
    display:flex;align-items:center;gap:8px;background:var(--paper);
    border:1px solid var(--line);border-radius:999px;padding:5px 12px 5px 5px;font-size:14px;font-weight:600;
  }
  .avatar{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:14px;font-weight:700;flex:0 0 auto;}
  .avatar.sm{width:20px;height:20px;font-size:11px;}
  .avatar.lg{width:34px;height:34px;font-size:17px;}
  .chip .del{cursor:pointer;color:var(--ink-soft);font-size:15px;margin-left:2px;line-height:1;}
  .chip .del:hover{color:var(--snack);}
  .add-member{
    width:34px;height:34px;border-radius:50%;border:1.5px dashed var(--line-strong);
    background:transparent;color:var(--ink-soft);font-size:20px;cursor:pointer;display:grid;place-items:center;
  }
  .add-member:hover{color:var(--ink);border-color:var(--ink-soft);}
  .members .empty{color:var(--ink-soft);font-size:13px;}

  /* ---------- calendar ---------- */
  .cal{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:10px 10px 12px;}
  .weekrow{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;padding:6px 0 10px;color:var(--ink-soft);font-size:13px;font-weight:600;border-bottom:1px solid var(--line);}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);}
  .cell{
    min-height:92px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:6px 7px;cursor:pointer;position:relative;transition:background .12s;
  }
  .cell:nth-child(7n){border-right:none;}
  .cell.blank{cursor:default;background:repeating-linear-gradient(-45deg,transparent,transparent 7px,rgba(200,185,155,.06) 7px,rgba(200,185,155,.06) 14px);}
  .cell:not(.blank):hover{background:#FBF6EA;}
  .cell .d{font-size:14px;color:var(--ink-soft);font-weight:600;}
  .cell.today{box-shadow:inset 0 0 0 2px var(--today);border-radius:8px;}
  .cell.today .d{color:var(--today);font-weight:800;}
  .cell .stack{display:flex;gap:-4px;margin-top:6px;flex-wrap:wrap;}
  .cell .stack .avatar{margin-right:-6px;border:2px solid var(--card);}
  .cell .more{font-size:11px;color:var(--ink-soft);align-self:center;margin-left:8px;}
  .cell .sum{position:absolute;right:7px;bottom:6px;font-weight:800;font-size:13px;}
  .cell .dots{position:absolute;left:7px;bottom:8px;display:flex;gap:3px;}
  .dot{width:6px;height:6px;border-radius:50%;}
  @media(max-width:560px){
    .cell{min-height:70px;padding:4px;}
    .cell .avatar.sm{width:16px;height:16px;font-size:9px;}
    .cell .sum{font-size:11px;}
  }

  /* ---------- summary ---------- */
  .summary{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 18px;}
  .summary h3{margin:0 0 4px;font-size:15px;letter-spacing:1px;}
  .sum-top{display:flex;flex-wrap:wrap;gap:18px;align-items:baseline;margin-bottom:14px;}
  .sum-big{font-size:30px;font-weight:800;}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:3px 10px;border-radius:999px;}
  .badge.meal{background:var(--meal-soft);color:#a3521f;}
  .badge.snack{background:var(--snack-soft);color:#963f66;}
  .userbar{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:14px;}
  .userbar .name{width:100px;flex:0 0 auto;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .track{flex:1;height:10px;background:var(--paper);border-radius:999px;overflow:hidden;}
  .track > i{display:block;height:100%;border-radius:999px;}
  .userbar .amt{width:72px;text-align:right;font-weight:700;}

  /* ---------- modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(46,37,28,.45);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto;}
  .overlay.show{display:flex;}
  .modal{background:var(--card);border-radius:18px;box-shadow:0 24px 60px rgba(46,37,28,.3);width:100%;max-width:460px;overflow:hidden;animation:pop .18s ease;}
  @keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0;}to{transform:none;opacity:1;}}
  .modal .head{padding:18px 20px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .modal .head .dt{font-size:18px;font-weight:800;}
  .modal .head .wd{font-size:13px;color:var(--ink-soft);}
  .modal .head .x{cursor:pointer;font-size:22px;color:var(--ink-soft);line-height:1;}
  .modal .head .x:hover{color:var(--ink);}
  .modal .body{padding:14px 20px 20px;max-height:64vh;overflow:auto;}
  .rec{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
  .rec:last-child{border-bottom:none;}
  .rec .info{flex:1;min-width:0;}
  .rec .info .n{font-weight:600;font-size:14px;}
  .rec .info .meta{font-size:12px;color:var(--ink-soft);}
  .rec .amt{font-weight:800;font-size:15px;}
  .rec .kill{cursor:pointer;color:var(--ink-soft);font-size:16px;}
  .rec .kill:hover{color:var(--snack);}
  .cat-tag{display:inline-block;font-size:11px;font-weight:700;padding:1px 7px;border-radius:999px;margin-right:4px;}
  .cat-tag.meal{background:var(--meal-soft);color:#a3521f;}
  .cat-tag.snack{background:var(--snack-soft);color:#963f66;}
  .empty-day{color:var(--ink-soft);font-size:14px;text-align:center;padding:16px 0;}

  .form{margin-top:16px;padding-top:16px;border-top:1px dashed var(--line-strong);}
  .form label{display:block;font-size:12px;color:var(--ink-soft);font-weight:600;margin:10px 0 5px;}
  .form input,.form select{
    width:100%;padding:10px 12px;border:1px solid var(--line-strong);border-radius:10px;
    font-size:15px;background:var(--paper);color:var(--ink);font-family:inherit;
  }
  .form input:focus,.form select:focus{outline:none;border-color:var(--meal);background:#fff;}
  .cat-pick{display:flex;gap:8px;}
  .cat-pick button{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--line-strong);background:var(--paper);cursor:pointer;font-weight:700;font-size:14px;color:var(--ink-soft);}
  .cat-pick button.active.meal{background:var(--meal-soft);border-color:var(--meal);color:#a3521f;}
  .cat-pick button.active.snack{background:var(--snack-soft);border-color:var(--snack);color:#963f66;}
  .row2{display:flex;gap:10px;}
  .row2 > *{flex:1;}
  .save{width:100%;margin-top:16px;background:var(--meal);color:#fff;border:none;padding:12px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;}
  .save:hover{filter:brightness(1.04);}
  .save:active{transform:translateY(1px);}

  .swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .swatches button{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
  .swatches button.active{border-color:var(--ink);}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:14px;line-height:1.6;}
  .foot{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:22px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="toolbar">
    <button class="btn ghost" id="btnExport">导出备份</button>
    <button class="btn ghost" id="btnImport">导入备份</button>
    <input type="file" id="fileInput" accept="application/json" hidden>
  </div>

  <div class="brand">
    <div class="logo">🍜</div>
    <div>
      <h1><span class="h1-edit" id="titleEl" contenteditable="true" spellcheck="false">群吃饭零食打卡月历</span></h1>
      <div class="sub">Shared Food Ledger</div>
    </div>
  </div>

  <div class="monthbar">
    <button class="nav prev" id="prevM">‹</button>
    <div class="title" id="monthTitle">2026年7月</div>
    <div class="today-link" id="todayLink">回到今天</div>
    <button class="nav next" id="nextM">›</button>
  </div>

  <div class="members" id="members"></div>

  <div class="cal">
    <div class="weekrow"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="summary">
    <h3>本月统计</h3>
    <div class="sum-top">
      <div><div class="sum-big tnum" id="monthTotal">¥0</div></div>
      <span class="badge meal">吃饭 <span class="tnum" id="mealTotal">¥0</span></span>
      <span class="badge snack">零食 <span class="tnum" id="snackTotal">¥0</span></span>
    </div>
    <div id="userBars"></div>
  </div>

  <div class="foot">数据保存在你自己的浏览器里 · 记得用「导出备份」保存或分享给群里</div>
</div>

<!-- 每日记录弹窗 -->
<div class="overlay" id="dayOverlay">
  <div class="modal">
    <div class="head">
      <div><div class="dt" id="dayTitle">7月16日</div><div class="wd" id="dayWeekday">星期四</div></div>
      <div class="x" data-close>×</div>
    </div>
    <div class="body">
      <div id="dayRecords"></div>
      <div class="form">
        <label>谁</label>
        <select id="fUser"></select>
        <label>类型</label>
        <div class="cat-pick">
          <button type="button" data-cat="meal" class="active meal">🍚 吃饭</button>
          <button type="button" data-cat="snack" class="snack">🍪 零食</button>
        </div>
        <div class="row2">
          <div><label>金额 ¥</label><input id="fAmount" type="number" inputmode="decimal" min="0" step="0.5" placeholder="0"></div>
          <div><label>备注（可选）</label><input id="fNote" type="text" placeholder="麻辣烫 / 奶茶…"></div>
        </div>
        <button class="save" id="addRecord">＋ 添加记录</button>
      </div>
    </div>
  </div>
</div>

<!-- 添加成员弹窗 -->
<div class="overlay" id="userOverlay">
  <div class="modal">
    <div class="head"><div class="dt">添加成员</div><div class="x" data-close>×</div></div>
    <div class="body">
      <div class="form" style="border:none;padding-top:0;margin-top:0;">
        <label>昵称</label>
        <input id="uName" type="text" placeholder="比如 kawally" maxlength="12">
        <label>头像（一个 emoji，可留空用首字）</label>
        <input id="uEmoji" type="text" placeholder="😺 🍔 ⭐️…" maxlength="2">
        <label>颜色</label>
        <div class="swatches" id="swatches"></div>
        <button class="save" id="saveUser" style="background:var(--today)">＋ 添加</button>
      </div>
      <div class="hint">成员之后可以在上方一排里点 × 删除。</div>
    </div>
  </div>
</div>

<script>
/* ============ 数据 ============ */
const KEY = "group_food_ledger_v1";
const COLORS = ["#E07B39","#C25E8A","#3F6B4F","#6E86C2","#B5892F","#8E5AA8","#4C9A8E","#C0503D"];
const CAT = { meal:{label:"吃饭",emoji:"🍚",color:"#E07B39"}, snack:{label:"零食",emoji:"🍪",color:"#C25E8A"} };
const WD = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];

let state = load();
let view = { y: new Date().getFullYear(), m: new Date().getMonth() };
let pickedCat = "meal";
let pickedColor = COLORS[0];
let openDate = null;

function load(){
  try{ const s = JSON.parse(localStorage.getItem(KEY)); if(s && s.users) return s; }catch(e){}
  return { title:"群吃饭零食打卡月历", users:[], records:[] };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function userById(id){ return state.users.find(u=>u.id===id); }
function fmt(n){ n=Math.round(n*100)/100; return "¥"+(n%1===0? n : n.toFixed(2)); }
function dkey(y,m,d){ return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0"); }
function avatarHTML(u, cls){
  const face = u.emoji || (u.name? u.name.trim()[0] : "?");
  return `<span class="avatar ${cls||''}" style="background:${u.color}">${face}</span>`;
}

/* ============ 渲染 ============ */
function render(){
  document.getElementById("titleEl").textContent = state.title;
  document.getElementById("monthTitle").textContent = `${view.y}年${view.m+1}月`;
  renderMembers();
  renderGrid();
  renderSummary();
  save();
}

function renderMembers(){
  const box = document.getElementById("members");
  box.innerHTML = "";
  if(state.users.length===0){
    const e = document.createElement("span");
    e.className="empty"; e.textContent="还没有成员，点右边 ＋ 添加 →";
    box.appendChild(e);
  }
  state.users.forEach(u=>{
    const c = document.createElement("span");
    c.className="chip";
    c.innerHTML = avatarHTML(u) + `<span>${u.name}</span><span class="del" title="删除成员">×</span>`;
    c.querySelector(".del").onclick = ()=>{
      if(confirm(`删除成员「${u.name}」？TA 的历史记录也会一起删除。`)){
        state.users = state.users.filter(x=>x.id!==u.id);
        state.records = state.records.filter(r=>r.userId!==u.id);
        render();
      }
    };
    box.appendChild(c);
  });
  const add = document.createElement("button");
  add.className="add-member"; add.textContent="＋"; add.title="添加成员";
  add.onclick = openUserModal;
  box.appendChild(add);
}

function renderGrid(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const first = new Date(view.y, view.m, 1);
  let lead = (first.getDay()+6)%7; // 周一为一列
  const days = new Date(view.y, view.m+1, 0).getDate();
  const now = new Date();
  for(let i=0;i<lead;i++){ const b=document.createElement("div"); b.className="cell blank"; grid.appendChild(b); }
  for(let d=1; d<=days; d++){
    const key = dkey(view.y, view.m, d);
    const recs = state.records.filter(r=>r.date===key);
    const cell = document.createElement("div");
    cell.className = "cell";
    if(now.getFullYear()===view.y && now.getMonth()===view.m && now.getDate()===d) cell.classList.add("today");
    let html = `<div class="d">${d}</div>`;
    if(recs.length){
      const ids = [...new Set(recs.map(r=>r.userId))];
      let stack = `<div class="stack">`;
      ids.slice(0,3).forEach(id=>{ const u=userById(id); if(u) stack+=avatarHTML(u,"sm"); });
      if(ids.length>3) stack += `<span class="more">+${ids.length-3}</span>`;
      stack += `</div>`;
      const cats = [...new Set(recs.map(r=>r.category))];
      let dots = `<div class="dots">` + cats.map(c=>`<span class="dot" style="background:${CAT[c].color}"></span>`).join("") + `</div>`;
      const total = recs.reduce((s,r)=>s+r.amount,0);
      html += stack + dots + `<div class="sum tnum">${fmt(total)}</div>`;
    }
    cell.innerHTML = html;
    cell.onclick = ()=>openDay(view.y, view.m, d);
    grid.appendChild(cell);
  }
}

function renderSummary(){
  const inMonth = state.records.filter(r=>{
    const [y,m] = r.date.split("-").map(Number);
    return y===view.y && (m-1)===view.m;
  });
  const total = inMonth.reduce((s,r)=>s+r.amount,0);
  const meal = inMonth.filter(r=>r.category==="meal").reduce((s,r)=>s+r.amount,0);
  const snack = inMonth.filter(r=>r.category==="snack").reduce((s,r)=>s+r.amount,0);
  document.getElementById("monthTotal").textContent = fmt(total);
  document.getElementById("mealTotal").textContent = fmt(meal);
  document.getElementById("snackTotal").textContent = fmt(snack);

  const bars = document.getElementById("userBars");
  bars.innerHTML = "";
  const perUser = state.users.map(u=>({
    u, amt: inMonth.filter(r=>r.userId===u.id).reduce((s,r)=>s+r.amount,0)
  })).filter(x=>x.amt>0).sort((a,b)=>b.amt-a.amt);
  const max = perUser.length? perUser[0].amt : 1;
  if(perUser.length===0){
    bars.innerHTML = `<div style="color:var(--ink-soft);font-size:13px;">本月还没有记录。</div>`;
    return;
  }
  perUser.forEach(({u,amt})=>{
    const row = document.createElement("div");
    row.className="userbar";
    row.innerHTML = `${avatarHTML(u,"sm")}<span class="name">${u.name}</span>
      <span class="track"><i style="width:${Math.max(6,amt/max*100)}%;background:${u.color}"></i></span>
      <span class="amt tnum">${fmt(amt)}</span>`;
    bars.appendChild(row);
  });
}

/* ============ 每日弹窗 ============ */
function openDay(y,m,d){
  if(state.users.length===0){ openUserModal(); return; }
  openDate = dkey(y,m,d);
  document.getElementById("dayTitle").textContent = `${m+1}月${d}日`;
  document.getElementById("dayWeekday").textContent = WD[new Date(y,m,d).getDay()];
  const sel = document.getElementById("fUser");
  sel.innerHTML = state.users.map(u=>`<option value="${u.id}">${u.emoji||""} ${u.name}</option>`).join("");
  document.getElementById("fAmount").value = "";
  document.getElementById("fNote").value = "";
  setCat("meal");
  renderDayRecords();
  document.getElementById("dayOverlay").classList.add("show");
}
function renderDayRecords(){
  const box = document.getElementById("dayRecords");
  const recs = state.records.filter(r=>r.date===openDate);
  if(recs.length===0){ box.innerHTML = `<div class="empty-day">今天还没有记录，在下面加一条 ↓</div>`; return; }
  const total = recs.reduce((s,r)=>s+r.amount,0);
  box.innerHTML = recs.map(r=>{
    const u = userById(r.userId); if(!u) return "";
    const cat = CAT[r.category];
    return `<div class="rec">
      ${avatarHTML(u)}
      <div class="info">
        <div class="n">${u.name}</div>
        <div class="meta"><span class="cat-tag ${r.category}">${cat.emoji}${cat.label}</span>${r.note?r.note:""}</div>
      </div>
      <div class="amt tnum">${fmt(r.amount)}</div>
      <div class="kill" data-kill="${r.id}" title="删除">🗑</div>
    </div>`;
  }).join("") + `<div style="text-align:right;font-weight:800;margin-top:8px" class="tnum">合计 ${fmt(total)}</div>`;
  box.querySelectorAll("[data-kill]").forEach(el=>{
    el.onclick = ()=>{ state.records = state.records.filter(r=>r.id!==el.dataset.kill); render(); renderDayRecords(); };
  });
}
function setCat(c){
  pickedCat = c;
  document.querySelectorAll(".cat-pick button").forEach(b=>{
    b.classList.toggle("active", b.dataset.cat===c);
  });
  document.querySelector(".save#addRecord").style.background = CAT[c].color;
}
document.querySelectorAll(".cat-pick button").forEach(b=> b.onclick = ()=>setCat(b.dataset.cat));

document.getElementById("addRecord").onclick = ()=>{
  const amt = parseFloat(document.getElementById("fAmount").value);
  if(!(amt>0)){ alert("请输入大于 0 的金额"); return; }
  state.records.push({
    id: uid(),
    userId: document.getElementById("fUser").value,
    date: openDate,
    category: pickedCat,
    amount: Math.round(amt*100)/100,
    note: document.getElementById("fNote").value.trim()
  });
  document.getElementById("fAmount").value = "";
  document.getElementById("fNote").value = "";
  render(); renderDayRecords();
};

/* ============ 成员弹窗 ============ */
function openUserModal(){
  document.getElementById("uName").value="";
  document.getElementById("uEmoji").value="";
  pickedColor = COLORS[state.users.length % COLORS.length];
  const sw = document.getElementById("swatches");
  sw.innerHTML = COLORS.map(c=>`<button style="background:${c}" data-c="${c}"></button>`).join("");
  sw.querySelectorAll("button").forEach(b=>{
    b.classList.toggle("active", b.dataset.c===pickedColor);
    b.onclick = ()=>{ pickedColor=b.dataset.c; sw.querySelectorAll("button").forEach(x=>x.classList.toggle("active",x===b)); };
  });
  document.getElementById("userOverlay").classList.add("show");
}
document.getElementById("saveUser").onclick = ()=>{
  const name = document.getElementById("uName").value.trim();
  if(!name){ alert("请输入昵称"); return; }
  state.users.push({ id:uid(), name, emoji:document.getElementById("uEmoji").value.trim(), color:pickedColor });
  document.getElementById("userOverlay").classList.remove("show");
  render();
};

/* ============ 顶部 / 导航 ============ */
document.getElementById("prevM").onclick = ()=>{ view.m--; if(view.m<0){view.m=11;view.y--;} render(); };
document.getElementById("nextM").onclick = ()=>{ view.m++; if(view.m>11){view.m=0;view.y++;} render(); };
document.getElementById("todayLink").onclick = ()=>{ const n=new Date(); view={y:n.getFullYear(),m:n.getMonth()}; render(); };

const titleEl = document.getElementById("titleEl");
titleEl.onblur = ()=>{ state.title = titleEl.textContent.trim() || "群吃饭零食打卡月历"; titleEl.textContent = state.title; save(); };
titleEl.onkeydown = (e)=>{ if(e.key==="Enter"){ e.preventDefault(); titleEl.blur(); } };

/* 关闭弹窗 */
document.querySelectorAll(".overlay").forEach(o=>{
  o.addEventListener("click", e=>{ if(e.target===o || e.target.dataset.close!==undefined) o.classList.remove("show"); });
});
document.addEventListener("keydown", e=>{ if(e.key==="Escape") document.querySelectorAll(".overlay").forEach(o=>o.classList.remove("show")); });

/* ============ 导出 / 导入 ============ */
document.getElementById("btnExport").onclick = ()=>{
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `食堂账本-${view.y}${String(view.m+1).padStart(2,"0")}.json`;
  a.click();
};
document.getElementById("btnImport").onclick = ()=> document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = (e)=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const data = JSON.parse(r.result);
      if(!data.users || !data.records) throw 0;
      if(confirm("导入会覆盖当前数据，确定吗？")){ state = data; render(); }
    }catch(err){ alert("文件格式不对，请选择本工具导出的备份。"); }
    e.target.value = "";
  };
  r.readAsText(f);
};

render();
</script>
</body>
</html>
